<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורטל למידה - לשון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Varela Round', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* רקע עדין של נקודות */
        .bg-dots {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
            opacity: 0.5;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        .btn-pastel {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(251, 194, 235, 0.4);
        }

        .btn-pastel:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(251, 194, 235, 0.6);
        }
        
        .btn-pastel:active {
            transform: translateY(0);
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="glass-card">
        <div class="text-7xl mb-6 floating">🎓</div>
        
        <div class="inline-block bg-indigo-50 text-indigo-600 font-bold px-4 py-1 rounded-full text-sm mb-4 border border-indigo-100">
            <i class="fas fa-book-open ml-1"></i> הכנה לבגרות 2026/2027
        </div>
        
        <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-4">פורטל למידה בלשון</h1>
        <p class="text-gray-600 text-lg mb-10 leading-relaxed">
            ברוכים הבאים! כאן נמצא הכלים המקיפים ביותר לתרגול לקראת הבגרות. מוכנים להפציץ?
        </p>
        
        <!-- כאן נמצא הקישור לקובץ hebrew.quiz -->
        <a href="hebrew.quiz" class="btn-pastel">
            כניסה למאסטר הגזרות <i class="fas fa-arrow-left"></i>
        </a>
        
        <div class="mt-12 pt-6 border-t border-gray-100 flex flex-col items-center">
            <p class="text-sm font-bold text-gray-400 mb-2">מחזור 2009 שולטים! 👑</p>
            <p class="text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full">
                <i class="fas fa-cat text-pink-300"></i> פותח בהשראת פיצפץ ודפני
            </p>
        </div>
    </div>
</body>
</html>
